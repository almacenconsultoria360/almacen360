<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada Manual - 360</title>
    <link rel="stylesheet" href="assets/css/AltaProducto.css">
    <link rel="stylesheet" href="assets/css/otroMEntrada.css">
    <link rel="stylesheet" href="assets/css/principal.css">
</head>
<body>
    <nav class="navbar">
    <a href="principal.html" class="logo-link">
        <img src="assets/img/logo.png" alt="Logo 360" class="logo-img">
        <div class="logo-textos-container">
            <span class="logo-texto">TRES SESENTA CONSULTORÍA, S.A. DE C.V.</span>
            <span class="logo-eslogan">LO QUE SE MIDE, SE PUEDE MEJORAR.</span>
        </div>
    </a>
    <a href="javascript:void(0);" onclick="window.history.back()" class="boton-regresar-derecha" title="Volver">
        <span class="icono-flecha">&#10094;</span> 
    </a>
</nav>
   
        
        
<main class="contenedor-principal">
    <div class="seccion-busqueda">
        <input type="text" id="inputBusqueda" class="busqueda-formal" 
               placeholder="🔍 Escribe ID, Nombre o Ubicación..." onkeyup="buscarEnFirebase()">
        <div id="resultados-busqueda" class="lista-resultados"></div>
    </div>

    <div class="modal-contenedor-lista">
        <div class="modal-header-formal">
            <h2>PRODUCTOS A INGRESAR</h2>
            <button class="btn-confirmar-todo" onclick="procesarEntradaManual()">
                CONFIRMAR INGRESO
            </button>
        </div>

        <div class="modal-tabla-scroll">
            <table class="tabla-formal-carga">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>PRODUCTO</th>
                        <th>UBICACIÓN</th>
                        <th style="text-align: center;">CANTIDAD</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista-carga-cuerpo">
                    </tbody>
            </table>
        </div>
    </div>
</main>
<div id="modal-entrega" class="modal-overlay-lista" style="display:none; z-index: 2000;">
    <div class="modal-contenedor-lista" style="max-width: 600px; height: auto; text-align: center; padding: 50px;">
        <button class="btn-cerrar-lista" onclick="cerrarModalesValidacion()">&times;</button>
        
        <h2 style="color: #7c4dff; font-size: 2rem; margin-bottom: 20px;">IDENTIFICACIÓN: ENTREGA</h2>
        <p style="font-size: 1.2rem; color: #666; margin-bottom: 30px;">Escanea tu código de empleado o digítalo:</p>
        
        <input type="text" id="inputEmpleadoEntrega" class="busqueda-formal" 
               placeholder="Código de Empleado..." autofocus>
        
        <button class="btn-confirmar-todo" style="width: 100%; margin-top: 20px;" onclick="validarEmpleado('entrega')">
            CONTINUAR ➜
        </button>
    </div>
</div>

<div id="modal-autoriza" class="modal-overlay-lista" style="display:none; z-index: 3000;">
    <div class="modal-contenedor-lista" style="max-width: 600px; height: auto; text-align: center; padding: 50px;">
        <button class="btn-cerrar-lista" onclick="cerrarModalesValidacion()">&times;</button>
        
        <h2 style="color: #2c3e50; font-size: 2rem; margin-bottom: 20px;">IDENTIFICACIÓN: AUTORIZA</h2>
        <p style="font-size: 1.2rem; color: #666; margin-bottom: 30px;">Escanea el código de quien autoriza la entrada:</p>
        
        <input type="text" id="inputEmpleadoAutoriza" class="busqueda-formal" 
               placeholder="Código de Autorizador...">
        
        <button class="btn-confirmar-todo" style="width: 100%; margin-top: 20px; background-color: #2c3e50;" onclick="validarEmpleado('autoriza')">
            CONFIRMAR TODO ✓
        </button>
    </div>
</div>
    <script type="module" src="assets/js/otroMEntrada.js"></script>
</body>
</html>
