<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baja de Empleado - 360</title>
    <link rel="stylesheet" href="assets/css/BAJAproducto.css"> 
</head>
<body>
    <header class="barra-superior-360">
        <a href="javascript:void(0);" onclick="volverAtras()" class="boton-regresar-magenta" title="Volver">
            <span class="icono-flecha">&#10094;</span> 
        </a>
        <div class="titulo-seccion-360">BAJA DE PERSONAL DEL SISTEMA</div>
    </header>

    <main class="contenedor-principal">
        <div class="alerta-auditoria">
            <div class="icono-alerta">⚠️</div>
            <div class="texto-alerta">
                <b>AVISO</b> Al dar de baja a un empleado, este dejará de aparecer en las listas de selección. El registro quedará guardado en el historial de bajas.
            </div>
        </div>

        <div class="seccion-busqueda">
            <div class="contenedor-input-busqueda">
                <span class="lupa-interactiva">🔍</span>
                <input type="text" id="inputBusqueda" class="busqueda-premium" 
                       placeholder="Buscar empleado por nombre o ID..." onkeyup="buscarEmpleado()">
            </div>
            <div id="resultados-busqueda" class="lista-resultados-moderna"></div>
        </div>

        <div id="contenedor-lista-empleados" class="espacio-apilado-moderno">
            </div>
    </main>

    <div id="modal-confirmar" class="modal-overlay-360" style="display:none;">
        <div class="modal-contenedor-360">
            <div class="cabecera-peligro">
                <span class="icono-warning">🚨</span>
                <h2>¿CONFIRMAR BAJA?</h2>
            </div>
            <p id="texto-confirmacion">¿Estás seguro de dar de baja a este empleado?</p>
            <div class="footer-modal">
                <button class="btn-modal btn-confirmar" onclick="eliminarEmpleadoDefinitivo()">CONFIRMAR BAJA</button>
                <button class="btn-modal btn-cancelar" onclick="cerrarModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/BAJAempleados.js"></script>
    <script src="assets/js/principal.js"></script>
</body>
</html>
