<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salida Manual - 360</title>
    <link rel="stylesheet" href="assets/css/AltaProducto.css">
    <link rel="stylesheet" href="assets/css/otroMSalida.css">
    <link rel="stylesheet" href="assets/css/principal.css">
</head>
<body>
    <nav class="navbar">
        <a href="principal.html" class="logo-link">
            <img src="assets/img/logo.png" alt="Logo 360" class="logo-img">
            <div class="logo-textos-container">
                <span class="logo-texto">TRES SESENTA CONSULTORÍA, S.A. DE C.V.</span>
                <span class="logo-eslogan">LO QUE SE MIDE, SE PUEDE MEJORAR.</span>
            </div>
        </a>
        <a href="javascript:void(0);" onclick="window.history.back()" class="boton-regresar-derecha" title="Volver">
            <span class="icono-flecha">&#10094;</span> 
        </a>
    </nav>
    
    <main class="contenedor-principal">
        <div class="seccion-busqueda">
            <input type="text" id="inputBusqueda" class="busqueda-formal" 
                   placeholder="🔍 Buscar ID o Nombre para salida..." onkeyup="buscarEnFirebase()">
            <div id="resultados-busqueda" class="lista-resultados"></div>
        </div>

        <div class="modal-contenedor-lista">
            <div class="modal-header-formal">
                <h2 class="titulo-rojo">PRODUCTOS A RETIRAR</h2>
                <button class="btn-confirmar-todo btn-rojo" onclick="procesarSalidaManual()">
                    CONFIRMAR SALIDA
                </button>
            </div>

            <div class="modal-tabla-scroll">
                <table class="tabla-formal-carga">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>PRODUCTO</th>
                            <th>EXISTENCIA</th>
                            <th style="text-align: center;">CANT. A SACAR</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="lista-salida-cuerpo"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-entrega" class="modal-overlay-lista" style="display:none; z-index: 2000;">
        <div class="modal-contenedor-lista modal-validacion">
            <button class="btn-cerrar-lista" onclick="cerrarModalesValidacion()">&times;</button>
            <h2 class="titulo-rojo">IDENTIFICACIÓN: RETIRA</h2>
            <p>Escanea el código de quien se lleva el material:</p>
            <input type="text" id="inputEmpleadoEntrega" class="busqueda-formal" placeholder="Código de Empleado..." autofocus>
            <button class="btn-confirmar-todo btn-rojo" style="width: 100%; margin-top: 20px;" onclick="validarEmpleado('entrega')">
                CONTINUAR ➜
            </button>
        </div>
    </div>

    <div id="modal-autoriza" class="modal-overlay-lista" style="display:none; z-index: 3000;">
        <div class="modal-contenedor-lista modal-validacion">
            <button class="btn-cerrar-lista" onclick="cerrarModalesValidacion()">&times;</button>
            <h2 style="color: #2c3e50;">IDENTIFICACIÓN: AUTORIZA</h2>
            <p>Código de quien autoriza la salida:</p>
            <input type="text" id="inputEmpleadoAutoriza" class="busqueda-formal" placeholder="Código de Autorizador...">
            <button class="btn-confirmar-todo" style="width: 100%; margin-top: 20px; background-color: #2c3e50;" onclick="validarEmpleado('autoriza')">
                FINALIZAR SALIDA ✓
            </button>
        </div>
    </div>

    <script type="module" src="assets/js/otroMSalida.js"></script>
</body>
</html>
