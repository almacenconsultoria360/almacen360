<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Empleados - 360</title>
    <link rel="stylesheet" href="assets/css/principal.css">
    <link rel="stylesheet" href="assets/css/altaEmpleados.css">
</head>
<body>

    <nav class="navbar">
        <a href="principal.html" class="logo-link">
            <img src="assets/img/logo.png" alt="Logo 360" class="logo-img">
            <div class="logo-textos-container">
                <span class="logo-texto">TRES SESENTA CONSULTORÍA, S.A. DE C.V.</span>
                <span class="logo-eslogan">LO QUE SE MIDE, SE PUEDE MEJORAR.</span>
            </div>
            <a href="javascript:void(0);" onclick="volverAtras()" class="boton-regresar-magenta" title="Volver">
    <span class="icono-flecha">&#10094;</span> 
</a>
        </a>
    </nav>

    <main class="contenedor-registro">
        <div class="panel-blanco-moderno">
            <div class="contenido-flex">
                <div class="seccion-tabla">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>NOMBRE COMPLETO</th>
                                <th>NÚMERO (TEL)</th>
                                <th>CORREO ELECTRÓNICO</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="emp-id" class="id-resaltado">----</td>
                                <td><input type="text" id="emp-nombre" placeholder="Nombre completo..." class="input-moderno"></td>
                                <td><input type="tel" id="emp-numero" placeholder="833 000 0000" class="input-moderno"></td>
                                <td><input type="email" id="emp-correo" placeholder="ejemplo@correo.com" class="input-moderno"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="panel-acciones-lateral">
                    <div class="tarjeta-botones">
                        <button class="btn-premium btn-guardar" onclick="guardarEmpleado()">REGISTRAR</button>
                        <button class="btn-premium btn-limpiar" onclick="limpiarCampos()">LIMPIAR</button>
                    </div>
                </div>
            </div>
            <p class="nota-informativa">
                * Asegúrese de que el número telefónico y el correo sean institucionales si están disponibles.
            </p>
        </div>
    </main>

    <script>
        function volverAtras() {
            if (document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = 'principal.html';
            }
        }
    </script>
    <script type="module" src="assets/js/altaEmpleados.js"></script>
</body>
</html>
