<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - 360</title>
    <link rel="stylesheet" href="assets/css/estadisticas.css">
</head>
<body>
    <header class="barra-superior-360">
        <a href="javascript:void(0);" onclick="volverAtras()" class="boton-regresar-magenta" title="Volver">
            <span class="icono-flecha">&#10094;</span> 
        </a>
        <div class="titulo-seccion-360">TABLERO DE ESTADÍSTICAS</div>
    </header>

    <main class="contenedor-principal">
        <div class="grid-estadisticas">
            <div class="card-metrica">
                <div class="icono-stats icon-blue">📦</div>
                <div class="info-stats">
                    <span class="label">Catálogo Total</span>
                    <h2 id="total-productos">0</h2>
                </div>
            </div>

            <div class="card-metrica">
                <div class="icono-stats icon-green">📥</div>
                <div class="info-stats">
                    <span class="label">Entradas (Hoy)</span>
                    <h2 id="entradas-hoy">0</h2>
                </div>
            </div>

            <div class="card-metrica">
                <div class="icono-stats icon-orange">📤</div>
                <div class="info-stats">
                    <span class="label">Salidas (Hoy)</span>
                    <h2 id="salidas-hoy">0</h2>
                </div>
            </div>

            <div class="card-metrica">
                <div class="icono-stats icon-red">⚠️</div>
                <div class="info-stats">
                    <span class="label">Bajas Históricas</span>
                    <h2 id="bajas-totales">0</h2>
                </div>
            </div>
        </div>

        <div class="panel-alerta-contenedor">
            <div class="cabecera-alerta-pro">
                <div class="titulo-alerta">
                    <span class="dot-pulso"></span>
                    <h3>PRODUCTOS EN STOCK CRÍTICO</h3>
                </div>
                
            </div>
            <div id="lista-stock-bajo" class="lista-alertas-premium">
                </div>
        </div>
    </main>

    <script type="module" src="assets/js/estadisticas.js"></script>
    <script src="assets/js/principal.js"></script>
</body>
</html>
