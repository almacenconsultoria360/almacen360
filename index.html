<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Mantenimiento | Volvemos Pronto</title>
    <style>
        /* Estilos Globales y Reset */
        :root {
            --primary-color: #3b82f6; /* Azul moderno */
            --bg-color-1: #0f172a; /* Fondo muy oscuro */
            --bg-color-2: #1e293b; /* Tono de fondo secundario */
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo degradado suave */
            background-color: var(--bg-color-1);
            background-image: radial-gradient(at 0% 0%, var(--bg-color-2) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, #172554 0px, transparent 50%);
            color: var(--text-main);
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        /* Contenedor Principal */
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03); /* Fondo translúcido */
            border-radius: 24px;
            backdrop-filter: blur(10px); /* Efecto cristal */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        /* Icono / Elemento Visual */
        .icon-box {
            position: relative;
            margin-bottom: 30px;
            display: inline-block;
        }

        .gear {
            font-size: 64px;
            color: var(--primary-color);
            display: inline-block;
            animation: rotateGear 4s linear infinite;
        }

        /* Títulos y Texto */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #a3e635); /* Degradado en texto */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Botón de Contacto */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        /* Pie de página pequeño */
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(148, 163, 184, 0.5);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Adaptación para pantallas pequeñas */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding: 30px 20px; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <div class="gear">⚙️</div>
        </div>

        <h1>¡Volvemos Pronto!</h1>
        
        <p>Nuestro sitio web se encuentra actualmente en mantenimiento para mejorar tu experiencia. Estamos trabajando duro y estaremos de vuelta en poco tiempo. <br> ¡Gracias por tu paciencia!</p>
        
        

        <div class="footer">
            © 2026 Tres Sesenta Consultoría S.A.
        </div>
    </div>

</body>
</html>
