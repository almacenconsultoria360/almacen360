<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tres Sesenta Consultoría</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c4dff;
            --primary-hover: #673ab7;
            --bg: #f0f2f5;
            --text: #1c1e21;
            --error: #ff3b30;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animación de entrada para la tarjeta */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-login {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeInScale 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            box-sizing: border-box;
        }

        .logo-login {
            width: 160px;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 {
            color: var(--text);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #4b4b4b;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 15px;
            background: white;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.1);
        }

        .btn-entrar {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(124, 77, 255, 0.3);
        }

        .btn-entrar:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(124, 77, 255, 0.4);
        }

        .btn-entrar:active {
            transform: translateY(0);
        }

        #errorMsg {
            background: #fff0f0;
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(255, 59, 48, 0.2);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #8a8d91;
        }
    </style>
</head>
<body>

    <div class="card-login">
        <img src="assets/img/logo.png" alt="Logo Tres Sesenta" class="logo-login">
        <h2>Bienvenido</h2>
        <p class="subtitle">Gestión de Inventario Institucional</p>
        
        <div class="input-group">
            <label for="userLogin">Usuario</label>
            <div class="input-wrapper">
                <input type="text" id="userLogin" placeholder="Nombre de usuario" spellcheck="false">
            </div>
        </div>

        <div class="input-group">
            <label for="passLogin">Contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="passLogin" placeholder="••••••••">
            </div>
        </div>

        <button class="btn-entrar" id="btnIngresar">Iniciar Sesión</button>
        
        <div id="errorMsg">⚠️ Los datos ingresados son incorrectos</div>

        <div class="footer-text">
            &copy; 2026 Tres Sesenta Consultoría S.A. de C.V.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDflDjy8z3y6TOkbn5OUAg8iwfvo6xptiw",
            authDomain: "inventario-6a5b7.firebaseapp.com",
            projectId: "inventario-6a5b7",
            storageBucket: "inventario-6a5b7.firebasestorage.app",
            messagingSenderId: "655864902994",
            appId: "1:655864902994:web:4497feaaa8da3a6171768b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const btn = document.getElementById('btnIngresar');
        const error = document.getElementById('errorMsg');

        btn.addEventListener('click', async () => {
            const userVal = document.getElementById('userLogin').value.trim();
            const passVal = document.getElementById('passLogin').value;

            if (!userVal || !passVal) return;

            // Feedback visual de carga
            btn.innerText = "Verificando...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";
            error.style.display = 'none';

            try {
                // Buscamos el documento (Sensible a mayúsculas/minúsculas según tu Firestore)
                const docSnap = await getDoc(doc(db, "usuarios", userVal));
                
                if (docSnap.exists() && docSnap.data().pass === passVal) {
                    const datos = docSnap.data();
                    sessionStorage.setItem('sesionActiva', 'true');
                    sessionStorage.setItem('usuarioNombre', datos.nombre);
                    sessionStorage.setItem('usuarioPuesto', datos.puesto);
                    
                    window.location.href = 'menu.html';
                } else {
                    mostrarError();
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión con el servidor");
                resetBtn();
            }
        });

        function mostrarError() {
            error.style.display = 'block';
            resetBtn();
        }

        function resetBtn() {
            btn.innerText = "Iniciar Sesión";
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        }

        // Permitir entrar con la tecla Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
