<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link rel="stylesheet" href="assets/css/principal.css" />
    <link rel="stylesheet" href="assets/css/inventario.css" />
    <title>Almacen 360 - Menú</title>
    <style>
        /* --- ESTILOS DE LA CAMPANA Y NAV --- */
        .nav-right {
            display: flex;
            align-items: center;
            margin-left: auto;
            padding-right: 15px;
            gap: 15px;
        }

        #btnNotificaciones {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 22px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .btn-cerrar-sesion {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        #contadorNotis {
            position: absolute;
            top: 2px; right: 2px;
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            border: 2px solid #fff;
            justify-content: center;
            align-items: center;
        }

        /* --- ESTILOS DE RESTRICCIÓN (MODO EMPLEADO) --- */
        .card-desactivada {
            opacity: 0.5;
            filter: grayscale(100%);
            cursor: not-allowed !important;
        }

        /* --- MODAL NOTIFICACIONES --- */
        .modal-notis {
            position: fixed;
            top: 0; right: 0;
            width: 380px; height: 100%;
            background: #ffffff;
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            z-index: 10000;
            display: none;
            flex-direction: column;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @media (max-width: 480px) { .modal-notis { width: 100%; } }

        .header-notis { padding: 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .lista-historial { flex-grow: 1; overflow-y: auto; padding: 15px; background: #fafafa; }
        .item-noti { padding: 15px; border-radius: 12px; background: #fff; margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .footer-notis { padding: 20px; border-top: 1px solid #f0f0f0; }
        .btn-limpiar { width: 100%; padding: 12px; background: #f8f8f8; border: none; border-radius: 8px; cursor: pointer; color: #999; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-link">
            <img src="assets/img/logo.png" alt="Logo" class="logo-img">
            <div class="logo-textos-container">
                <span class="logo-texto">TRES SESENTA CONSULTORÍA</span>
                <span class="logo-eslogan">LO QUE SE MIDE, SE PUEDE MEJORAR.</span>
            </div>
        </div>

        <div class="nav-right">
            <button class="btn-cerrar-sesion" onclick="cerrarSesion()">Salir</button>
            <button id="btnNotificaciones" onclick="abrirPanelNotis()">
                🔔<span id="contadorNotis">0</span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-formal">
            <header class="container-header">
                <h1 id="saludoBienvenida">Panel de Selección</h1>
                <p>Hola, <span id="nombreUser" style="font-weight: bold; color: #7c4dff;">Usuario</span>. Seleccione una acción.</p>
            </header>

            <div class="botones-grid">
                <a href="principal.html" id="cardAgregar" class="option-card card-agregar">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                        </svg>
                    </div>
                    <div class="option-info">
                        <span class="title">Agregar Inventario</span>
                        <span class="desc">Registro de entradas y nuevos productos</span>
                    </div>
                </a>

                <a href="inventario2.html" class="option-card card-ver">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        </svg>
                    </div>
                    <div class="option-info">
                        <span class="title">Ver Inventario</span>
                        <span class="desc">Consulta de stock y estadísticas actuales</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <div id="modalNotificaciones" class="modal-notis">
        <div class="header-notis">
            <h3>Notificaciones</h3>
            <button onclick="cerrarPanelNotis()" style="background:none; border:none; font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="listaHistorial" class="lista-historial"></div>
        <div class="footer-notis">
            <button onclick="limpiarHistorial()" class="btn-limpiar">Limpiar Todo</button>
        </div>
    </div>

    <script>
        // 1. SEGURIDAD: Verificar sesión
        if (sessionStorage.getItem('sesionActiva') !== 'true') {
            window.location.href = 'index.html'; 
        }

        // 2. RESTRICCIÓN DE PUESTO
        document.addEventListener('DOMContentLoaded', () => {
            const puesto = sessionStorage.getItem('usuarioPuesto');
            const nombre = sessionStorage.getItem('usuarioNombre');
            const cardAgregar = document.getElementById('cardAgregar');
            
            if(nombre) document.getElementById('nombreUser').innerText = nombre;

            if (puesto === 'empleado') {
                cardAgregar.classList.add('card-desactivada');
                cardAgregar.onclick = function(e) {
                    e.preventDefault(); // Evita que el enlace funcione
                    alert("Acceso denegado: Solo el Gerente puede agregar inventario.");
                };
            }
        });

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        /* --- LÓGICA DE NOTIFICACIONES --- */
        window.historial = JSON.parse(localStorage.getItem('historial360')) || [];
        window.noLeidas = 0;

        window.registrarMovimientoLocal = function(tipo, titulo, mensaje) {
            const sonidoNoti = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            sonidoNoti.play().catch(e => {});

            const iconos = { entrada: '📈', salida: '📉', critico: '🚨' };
            const nuevoMov = {
                icono: iconos[tipo] || '🔔',
                titulo: titulo,
                mensaje: mensaje.replace(/\n/g, '<br>'),
                hora: new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' })
            };

            window.historial.unshift(nuevoMov);
            if(window.historial.length > 30) window.historial.pop();
            window.noLeidas++;
            localStorage.setItem('historial360', JSON.stringify(window.historial));
            actualizarInterfazHistorial();
        };

        window.actualizarInterfazHistorial = function() {
            const lista = document.getElementById('listaHistorial');
            const contador = document.getElementById('contadorNotis');
            if (!lista) return;

            lista.innerHTML = window.historial.length === 0 ? 
                '<div style="text-align:center; margin-top:100px; color:#bbb;">Sin movimientos</div>' :
                window.historial.map(n => `
                    <div class="item-noti">
                        <strong>${n.icono} ${n.titulo}</strong>
                        <p>${n.mensaje}</p>
                        <small>${n.hora}</small>
                    </div>
                `).join('');

            if (window.noLeidas > 0) {
                contador.innerText = window.noLeidas;
                contador.style.display = 'flex';
            } else {
                contador.style.display = 'none';
            }
        };

        window.abrirPanelNotis = () => {
            document.getElementById('modalNotificaciones').style.display = 'flex';
            window.noLeidas = 0;
            actualizarInterfazHistorial();
        };

        window.cerrarPanelNotis = () => {
            document.getElementById('modalNotificaciones').style.display = 'none';
        };

        window.limpiarHistorial = () => {
            if(confirm("¿Vaciar historial?")) {
                window.historial = []; window.noLeidas = 0;
                localStorage.setItem('historial360', JSON.stringify(window.historial));
                actualizarInterfazHistorial();
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'historial360') {
                window.historial = JSON.parse(e.newValue) || [];
                window.noLeidas++;
                actualizarInterfazHistorial();
            }
        });

        actualizarInterfazHistorial();
    </script>
</body>
</html>
